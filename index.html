<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>나의 일정</title>
</head>
<body>
  <h1>나의 일정</h1>
 
  <form id="form">
    <input type="date" id="date" required />
    <input type="text" id="content" placeholder="할 일" required />
    <button type="submit">추가</button>
  </form>
 
  <ul id="list"></ul>
 
  <script>
    // 3.4에서 복사한 웹 앱 주소를 붙여 넣습니다
    const URL = "https://script.google.com/macros/s/AKfycbwSva-72Y3m_bDUHb2YTNGgCyP1TF4HPqbtdaneWURlU-2m90MoVjz5BWqUI52keGkf/exec";
 
    // 시트에서 일정 목록을 불러와 화면에 그립니다
    async function load() {
      const res = await fetch(URL);
      const data = await res.json();
      const list = document.getElementById("list");
      list.innerHTML = "";
      data.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = item.date + " · " + item.content;
        list.appendChild(li);
      });
    }
 
    // 추가 버튼을 누르면 시트에 한 줄 보내고, 다시 목록을 새로 그립니다
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const date = document.getElementById("date").value;
      const content = document.getElementById("content").value;
      await fetch(URL, {
        method: "POST",
        body: JSON.stringify({ date, content }),
      });
      e.target.reset();
      load();
    });
 
    // 페이지를 열면 곧바로 목록을 불러옵니다
    load();
  </script>
</body>
</html>
